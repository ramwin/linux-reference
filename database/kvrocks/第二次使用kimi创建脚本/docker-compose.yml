name: kvrocks-ha-cluster
networks:
  kvrocks_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  kvrocks1:
    image: apache/kvrocks:latest
    container_name: kvrocks1
    hostname: kvrocks1
    user: "0:0"
    networks:
      kvrocks_network:
        ipv4_address: 172.20.0.11
    ports:
      - "6666:6666"
      - "16666:16666"
    volumes:
      - ./data/1:/data
      - ./config/kvrocks-cluster.conf.template:/opt/kvrocks/conf/kvrocks.conf:ro
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /opt/kvrocks/conf/kvrocks.conf /tmp/kvrocks.conf && echo 'cluster-announce-ip 172.20.0.11' >> /tmp/kvrocks.conf && echo 'cluster-announce-port 6666' >> /tmp/kvrocks.conf && echo 'cluster-announce-bus-port 16666' >> /tmp/kvrocks.conf && mkdir -p /data && chmod 755 /data && exec kvrocks -c /tmp/kvrocks.conf"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6666 PING | grep -q PONG || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  kvrocks4:
    image: apache/kvrocks:latest
    container_name: kvrocks4
    hostname: kvrocks4
    user: "0:0"
    networks:
      kvrocks_network:
        ipv4_address: 172.20.0.14
    ports:
      - "6669:6666"
      - "16669:16666"
    volumes:
      - ./data/4:/data
      - ./config/kvrocks-cluster.conf.template:/opt/kvrocks/conf/kvrocks.conf:ro
