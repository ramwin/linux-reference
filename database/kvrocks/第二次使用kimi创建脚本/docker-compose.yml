version: '3.8'

networks:
  kvrocks_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  # 主节点 1 & 其备份 4
  kvrocks1:
    image: apache/kvrocks:latest
    container_name: kvrocks1
    hostname: kvrocks1
    networks:
      kvrocks_network:
        ipv4_address: 172.20.0.11
    ports:
      - "6666:6666"
      - "16666:16666"  # 集群总线端口
    volumes:
      - ./data/1:/data
      - ./config/kvrocks-cluster.conf.template:/opt/kvrocks/conf/kvrocks.conf:ro
    command: >
      sh -c "cp /opt/kvrocks/conf/kvrocks.conf /tmp/kvrocks.conf &&
             echo 'cluster-announce-ip 172.20.0.11' >> /tmp/kvrocks.conf &&
             echo 'cluster-announce-port 6666' >> /tmp/kvrocks.conf &&
             echo 'cluster-announce-bus-port 16666' >> /tmp/kvrocks.conf &&
             exec kvrocks -c /tmp/kvrocks.conf"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6666", "PING"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  kvrocks4:
    image: apache/kvrocks:latest
    container_name: kvrocks4
    hostname: kvrocks4
    networks:
      kvrocks_network:
        ipv4_address: 172.20.0.14
    ports:
      - "6669:6666"
      - "16669:16666"
    volumes:
      - ./data/4:/data
      - ./config/kvrocks-cluster.conf.template:/opt/kvrocks/conf/kvrocks.conf:ro
    command: >
      sh -c "cp /opt/kvrocks/conf/kvrocks.conf /tmp/kvrocks.conf &&
             echo 'cluster-announce-ip 172.20.0.14' >> /tmp/kvrocks.conf &&
             echo 'cluster-announce-port 6666' >> /tmp/kvrocks.conf &&
             echo 'cluster-announce-bus-port 16666' >> /tmp/kvrocks.conf &&
             exec kvrocks -c /tmp/kvrocks.conf"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6666", "PING"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    depends_on:
      kvrocks1:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

