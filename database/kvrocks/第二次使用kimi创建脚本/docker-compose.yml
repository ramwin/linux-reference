    command: ["cp /opt/kvrocks/conf/kvrocks.conf /tmp/kvrocks.conf && echo 'cluster-announce-ip 172.20.0.14' >> /tmp/kvrocks.conf && echo 'cluster-announce-port 6666' >> /tmp/kvrocks.conf && echo 'cluster-announce-bus-port 16666' >> /tmp/kvrocks.conf && mkdir -p /data && chmod 755 /data && exec kvrocks -c /tmp/kvrocks.conf"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6666 PING | grep -q PONG || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    depends_on:
      kvrocks1:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

