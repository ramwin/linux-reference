# Kvrocks 基础配置文件
# 包含所有节点通用的配置项

# ============================================
# 基础配置
# ============================================
bind 0.0.0.0
dir /var/lib/kvrocks
pidfile /var/run/kvrocks.pid
db-name change.me.db

# 日志配置
loglevel notice
log-dir /var/log/kvrocks

# 集群模式启用（节点需单独设置 node-id）
cluster-enabled yes

# ============================================
# RocksDB 优化配置 - 大数据量场景
# ============================================

# 写入缓冲区
write-buffer-size 256mb
max-write-buffer-number 6
min-write-buffer-number-to-merge 2

# 数据库大小限制（0=无限制）
max-db-size 0

# 后台线程
rocksdb.background-threads 4
rocksdb.high-priority-background-threads 2

# 压缩算法
rocksdb.compression lz4
rocksdb.bottommost_compression zstd

# 块缓存（大数据量关键配置）
rocksdb.block_size 32kb
rocksdb.block_cache_size 2gb
rocksdb.metadata_block_cache_size 512mb

# 后台任务
rocksdb.max_subcompactions 3
rocksdb.max_background_jobs 6

# 层级配置
rocksdb.target_file_size_multiplier 2
rocksdb.target_file_size_base 128mb
rocksdb.max_bytes_for_level_base 1gb
rocksdb.max_bytes_for_level_multiplier 8

# 文件句柄
rocksdb.max_open_files 65535

# 写选项
rocksdb.write_options.sync no
rocksdb.write_options.disable_wal no

# 统计
rocksdb.enable-statistics yes
rocksdb.stats-dump-period-sec 600

# ============================================
# 连接与性能配置
# ============================================

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端缓冲区
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 4gb 2gb 120

# 超时设置
timeout 0
tcp-keepalive 300

# 备份目录
backup-dir /var/lib/kvrocks/backup

# 错误处理
stop-writes-on-bgsave-error yes

# Docker 运行需要
daemonize no
protected-mode no
