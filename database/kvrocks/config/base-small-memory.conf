# Kvrocks 小内存基础配置
# 用于强制数据频繁落盘验证
# 使用方式: 替换 base.conf 或临时挂载为此配置

# ============================================
# 基础配置
# ============================================
bind 0.0.0.0
dir /var/lib/kvrocks
pidfile /var/run/kvrocks.pid
db-name change.me.db

loglevel notice
log-dir /var/log/kvrocks
cluster-enabled yes

# ============================================
# RocksDB 小内存配置 - 强制频繁刷盘
# ============================================

# 极小的写缓冲区 - 数据很快刷到磁盘
write-buffer-size 4mb
max-write-buffer-number 2
min-write-buffer-number-to-merge 1

# 数据库大小无限制
max-db-size 0

# 后台线程
rocksdb.background-threads 2
rocksdb.high-priority-background-threads 1

# 压缩算法
rocksdb.compression lz4

# 极小的块缓存 - 强制从磁盘读取
rocksdb.block_size 16kb
rocksdb.block_cache_size 8mb
rocksdb.metadata_block_cache_size 2mb

# 后台任务
rocksdb.max_subcompactions 1
rocksdb.max_background_jobs 2

# 层级配置
rocksdb.target_file_size_multiplier 2
rocksdb.target_file_size_base 4mb
rocksdb.max_bytes_for_level_base 32mb
rocksdb.max_bytes_for_level_multiplier 8

rocksdb.max_open_files 1024

# 同步写选项 - 更频繁刷盘
rocksdb.write_options.sync no
rocksdb.write_options.disable_wal no

# 统计
rocksdb.enable-statistics yes
rocksdb.stats-dump-period-sec 60

# ============================================
# 连接配置
# ============================================
slowlog-log-slower-than 10000
slowlog-max-len 128
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 128mb 60
timeout 0
tcp-keepalive 300
backup-dir /var/lib/kvrocks/backup
stop-writes-on-bgsave-error yes
daemonize no
protected-mode no
